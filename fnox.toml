#:schema https://fnox.jdx.dev/schema.json

# Secrets for local development — age-encrypted ciphertext, safe to commit.
# Plaintext values are in mise.toml [env]; only secrets go here.
#
# One-time setup:
#   1. mise run bootstrap  — extracts infra SSH key to .hetzner-infra-ed25519 (repo-local, gitignored)
#   2. fnox set <KEY> --provider age  — encrypt each secret into this file
#   3. Verify: fnox get HETZNER_ROBOT_PASSWORD
#
# FNOX_AGE_KEY_FILE is set in mise.toml [env] (./.hetzner-infra-ed25519) — fnox picks it up automatically.

[providers.age]
type = "age"
# Uses the infra SSH key (Ansible vault_github_actions_ssh_private_key).
# The private key is extracted to ./.hetzner-infra-ed25519 (repo-local, gitignored) by mise run bootstrap.
# To add team members, append their ssh-ed25519 public key and run: fnox reencrypt -p age
recipients = [
    "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIM/H7Jp2RgC1xtg1nyzpmhzOTmUz3n+PQPsk83BzUskg github-actions@yral.com",
]

[secrets]