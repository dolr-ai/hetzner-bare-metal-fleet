name: Grant Temporary SSH Access

on:
  workflow_dispatch:
    inputs:
      team_member:
        description: "Team member to grant access"
        required: true
        type: choice
        options:
          - ansuman
          - naitik
          - prakash
          - rishi
          - sarvesh
      target_host:
        description: "Target host (specific hostname or 'all')"
        required: true
        type: string

env:
  ANSIBLE_HOST_KEY_CHECKING: False
  ANSIBLE_FORCE_COLOR: True

jobs:
  grant-access:
    name: Grant SSH Access
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ansible environment
        run: bash setup.sh

      - name: Grant SSH access
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
        run: |
          set -e

          # Set up vault password
          echo "$ANSIBLE_VAULT_PASSWORD" > ansible/.vault_pass
          chmod 600 ansible/.vault_pass

          # Validate vault password file
          [ -s ansible/.vault_pass ] || { echo "ERROR: Vault password file is empty - GitHub secret may not be set"; exit 1; }
          echo "✓ Vault password file created ($(wc -c < ansible/.vault_pass) bytes)"

          # Test vault password with quick decryption
          ansible-vault view --vault-password-file=ansible/.vault_pass ansible/inventory/group_vars/all/vault.yml >/dev/null 2>&1 \
            && echo "✓ Vault password validated successfully" \
            || { echo "ERROR: Vault password test failed - incorrect password"; exit 1; }

          # Extract SSH key from vault
          mkdir -p ~/.ssh
          ansible-vault view ansible/inventory/group_vars/all/vault.yml \
            | awk '/vault_github_actions_ssh_private_key:/,/-----END OPENSSH PRIVATE KEY-----/' \
            | tail -n +2 | sed 's/^  //' > ~/.ssh/ansible_hetzner_fleet
          chmod 600 ~/.ssh/ansible_hetzner_fleet

          # Cleanup function to remove temporary credentials
          cleanup() {
            rm -f ~/.ssh/ansible_hetzner_fleet
            rm -f ansible/.vault_pass
          }
          trap cleanup EXIT

          # Grant SSH access
          ansible-playbook ansible/playbooks/ssh-access.yml \
            --limit "${{ inputs.target_host }}" \
            --extra-vars "team_member_name=${{ inputs.team_member }}"
