name: Grant Temporary SSH Access

on:
  workflow_dispatch:
    inputs:
      team_member:
        description: "Team member to grant access"
        required: true
        type: choice
        options:
          - ansuman
          - naitik
          - prakash
          - rishi
          - sarvesh
      target_host:
        description: "Target host (specific hostname or 'all')"
        required: true
        type: string

env:
  ANSIBLE_HOST_KEY_CHECKING: False
  ANSIBLE_FORCE_COLOR: True

jobs:
  grant-access:
    name: Grant SSH Access
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup mise + project tools
        uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Grant SSH access
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
        run: |
          set -e

          # Set up vault password
          echo "$ANSIBLE_VAULT_PASSWORD" > ansible/.vault_pass
          chmod 600 ansible/.vault_pass

          # Validate vault password file
          [ -s ansible/.vault_pass ] || { echo "ERROR: Vault password file is empty - GitHub secret may not be set"; exit 1; }
          echo "✓ Vault password file created ($(wc -c < ansible/.vault_pass) bytes)"

          # Bootstrap: create .venv, install Ansible, extract infra SSH key from vault
          mise run bootstrap

          # Cleanup function to remove temporary credentials
          cleanup() {
            rm -f .hetzner-infra-ed25519
            rm -f ansible/.vault_pass
          }
          trap cleanup EXIT

          # Grant SSH access
          ansible-playbook ansible/playbooks/ssh-access.yml \
            --limit "${{ inputs.target_host }}" \
            --extra-vars "team_member_name=${{ inputs.team_member }}"
