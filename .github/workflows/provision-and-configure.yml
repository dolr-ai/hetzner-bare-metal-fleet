name: Provision and Configure Bare Metal Server

on:
  workflow_dispatch:
    inputs:
      target_host:
        description: "Target host to provision (must exist in inventory)"
        required: true
        type: string
      force_provision:
        description: "Force provisioning even if server is already provisioned (DESTRUCTIVE)"
        required: false
        default: false
        type: boolean
      skip_rescue:
        description: "Skip rescue activation (if server is already in rescue mode)"
        required: false
        default: false
        type: boolean

env:
  ANSIBLE_HOST_KEY_CHECKING: False
  ANSIBLE_FORCE_COLOR: True

jobs:
  provision:
    name: Provision Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Provision and configure server
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/dolr-ai/hetzner-fleet-devcontainer
          cacheFrom: ghcr.io/dolr-ai/hetzner-fleet-devcontainer
          push: filter
          runCmd: |
            set -e
            
            # Enable colored output for Ansible
            export ANSIBLE_FORCE_COLOR=true
            
            # Set up vault password
            echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > ansible/.vault_pass
            chmod 600 ansible/.vault_pass
            
            # Validate vault password file
            [ -s ansible/.vault_pass ] || { echo "ERROR: Vault password file is empty - GitHub secret may not be set"; exit 1; }
            echo "✓ Vault password file created ($(wc -c < ansible/.vault_pass) bytes)"
            
            # Test vault password with quick decryption
            ansible-vault view --vault-password-file=ansible/.vault_pass ansible/inventory/group_vars/all/vault.yml >/dev/null 2>&1 && echo "✓ Vault password validated successfully" || { echo "ERROR: Vault password test failed - incorrect password"; exit 1; }
            
            # Extract SSH key from vault via post-create.sh (idempotent; skipped at
            # container-build time when vault pass was a placeholder, succeeds now)
            bash .devcontainer/post-create.sh
            
            # Cleanup function to remove temporary credentials
            cleanup() {
              rm -f ~/.ssh/ansible_hetzner_fleet
              rm -f ansible/.vault_pass
            }
            trap cleanup EXIT
            
            # Full idempotent provision: rescue → OS install → btrfs RAID 0 → update → ssh → docker → beszel
            ansible-playbook ansible/playbooks/provision.yml \
              --limit "${{ inputs.target_host }}" \
              --extra-vars "force_provision=${{ inputs.force_provision }} skip_rescue_activation=${{ inputs.skip_rescue }}"
