name: Fleet Maintenance

on:
  workflow_dispatch:
    inputs:
      target_hosts:
        description: "Target hosts (specific hostname, group, or 'all'). Defaults to all bare_metal hosts."
        required: false
        default: "bare_metal"
        type: string
      enable_reboot:
        description: "Allow automatic reboot after system update if required"
        required: false
        default: true
        type: boolean
  schedule:
    - cron: "0 2 * * 0"  # Sundays at 2 AM UTC

env:
  ANSIBLE_HOST_KEY_CHECKING: False
  ANSIBLE_FORCE_COLOR: True

jobs:
  maintenance:
    name: Run Fleet Maintenance
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # devcontainer.json bind-mounts ~/.ssh/agent.sock from the host so
      # developers can forward their SSH agent into the container. In CI
      # there is no SSH agent socket, so create a placeholder file to
      # prevent Docker from failing on the missing bind-mount source.
      - name: Create SSH agent socket placeholder
        run: mkdir -p ~/.ssh && touch ~/.ssh/agent.sock

      # devcontainer.json bind-mounts ~/.config/gh so the gh CLI config is
      # available inside the container. GitHub-hosted runners don't have this
      # directory by default, so create it as an empty placeholder.
      - name: Create gh config placeholder
        run: mkdir -p ~/.config/gh

      - name: Run fleet maintenance
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/dolr-ai/hetzner-fleet-devcontainer
          cacheFrom: ghcr.io/dolr-ai/hetzner-fleet-devcontainer
          push: filter
          runCmd: |
            set -e
            
            # Enable colored output for Ansible
            export ANSIBLE_FORCE_COLOR=true
            
            # Set up vault password
            echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > ansible/.vault_pass
            chmod 600 ansible/.vault_pass
            
            # Validate vault password file
            [ -s ansible/.vault_pass ] || { echo "ERROR: Vault password file is empty - GitHub secret may not be set"; exit 1; }
            echo "✓ Vault password file created ($(wc -c < ansible/.vault_pass) bytes)"
            
            # Test vault password with quick decryption
            ansible-vault view --vault-password-file=ansible/.vault_pass ansible/inventory/group_vars/all/vault.yml >/dev/null 2>&1 && echo "✓ Vault password validated successfully" || { echo "ERROR: Vault password test failed - incorrect password"; exit 1; }
            
            # Extract SSH key from vault (github-actions@yral.com)
            mkdir -p ~/.ssh
            ansible-vault view ansible/inventory/group_vars/all/vault.yml | awk '/vault_github_actions_ssh_private_key:/,/-----END OPENSSH PRIVATE KEY-----/' | tail -n +2 | sed 's/^  //' > ~/.ssh/ansible_hetzner_fleet
            chmod 600 ~/.ssh/ansible_hetzner_fleet
            
            # Cleanup function to remove temporary credentials
            cleanup() {
              rm -f ~/.ssh/ansible_hetzner_fleet
              rm -f ansible/.vault_pass
            }
            trap cleanup EXIT
            
            # Determine target (scheduled runs always hit all bare_metal hosts)
            TARGET="${{ inputs.target_hosts }}"
            [ -z "$TARGET" ] && TARGET="bare_metal"
            
            # Run weekly maintenance: apt upgrade → beszel agent/hub update → SSH key reset
            ansible-playbook ansible/playbooks/weekly-update.yml \
              --limit "$TARGET" \
              --extra-vars "enable_reboot=${{ inputs.enable_reboot }}"
