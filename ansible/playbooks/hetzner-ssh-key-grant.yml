---
# Thin wrapper — all logic lives in the ssh_key_grant role.
# Usage: ansible-playbook ansible/playbooks/hetzner-ssh-key-grant.yml \
#          --limit <hostname> -e team_member_name=<name>

- name: Grant temporary SSH access to team member
  hosts: "{{ target | default('all') }}"
  gather_facts: true
  roles:
    - role: ssh_key_grant
