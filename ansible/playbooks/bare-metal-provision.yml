---
# Kept for backwards compatibility. Use provision.yml for new runs.
# Usage: ansible-playbook ansible/playbooks/bare-metal-provision.yml --limit <hostname>

- name: Activate Hetzner rescue mode
  hosts: "{{ target | default('all') }}"
  gather_facts: false
  roles:
    - role: hetzner_rescue
      when: not (skip_rescue_activation | default(false) | bool)

- name: Provision bare metal server
  hosts: "{{ target | default('all') }}"
  gather_facts: false
  roles:
    - role: bare_metal_provision

- name: Initial host setup (update, ssh security, docker, monitoring)
  hosts: "{{ target | default('all') }}"
  gather_facts: true
  roles:
    - role: system_update
    - role: ssh_security
    - role: docker
    - role: beszel_agent
