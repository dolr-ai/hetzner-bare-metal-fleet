---
# Generate local development environment variables from Ansible vault.
# This is intended for local/devcontainer bootstrap only.
- name: Generate repository .env from vault
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ../inventory/group_vars/all/vars.yml
    - ../inventory/group_vars/all/vault.yml

  tasks:
    - name: Write .env with local development secrets
      copy:
        dest: "{{ playbook_dir }}/../../.env"
        mode: "0600"
        content: |
          # Generated by .devcontainer/setup-dev-env.yml
          # Do not commit this file.
          # Add vault-backed secrets here as needed.
      no_log: true
