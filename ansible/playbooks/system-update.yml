---
# Thin wrapper — runs apt full-upgrade, refreshes beszel agent images on all
# target hosts, then updates the beszel hub on uptime-monitor-1.
# Usage: ansible-playbook ansible/playbooks/system-update.yml --limit <hostname>
#        ansible-playbook ansible/playbooks/system-update.yml -e enable_reboot=true

# ── Play 1: apt full-upgrade + beszel agent image refresh (rolling) ──────────
- name: System update and beszel agent refresh
  hosts: "{{ target | default('bare_metal') }}"
  serial: 1
  max_fail_percentage: 50
  gather_facts: false
  roles:
    - role: system_update
    - role: beszel_agent

# ── Play 2: Update beszel hub on uptime-monitor-1 ────────────────────────────
- name: Update beszel hub
  hosts: uptime-monitor-1
  gather_facts: false
  roles:
    - role: beszel_hub
