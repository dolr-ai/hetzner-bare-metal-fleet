---
# Thin wrapper — all logic lives in the system_update role.
# Usage: ansible-playbook ansible/playbooks/system-update.yml --limit <hostname>
#        ansible-playbook ansible/playbooks/system-update.yml -e enable_reboot=true

- name: System update and upgrade
  hosts: "{{ target | default('all') }}"
  serial: 1
  max_fail_percentage: 50
  gather_facts: false
  roles:
    - role: system_update
