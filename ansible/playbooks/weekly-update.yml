---
# Weekly maintenance playbook.
# Runs in order:
#   1. Full apt upgrade on all bare metal hosts (serial: 1)
#   2. Update beszel agent on all bare metal hosts (serial: 1)
#   3. Update beszel hub on uptime-monitor-1
#   4. Reset authorized_keys to canonical set on all bare metal hosts
#
# Usage:
#   ansible-playbook ansible/playbooks/weekly-update.yml
#   ansible-playbook ansible/playbooks/weekly-update.yml --limit <hostname>
#   ansible-playbook ansible/playbooks/weekly-update.yml -e enable_reboot=true

# ── Play 1 & 2: System update + beszel agent update (rolling, one host at a time) ──
- name: System update and beszel agent refresh
  hosts: bare_metal
  serial: 1
  max_fail_percentage: 50
  gather_facts: true
  roles:
    - role: system_update
    - role: beszel_agent

# ── Play 3: Update beszel hub on uptime-monitor-1 ───────────────────────────
- name: Update beszel hub
  hosts: uptime-monitor-1
  gather_facts: false
  roles:
    - role: beszel_hub

# ── Play 4: Reset SSH authorized_keys to canonical set on all hosts ─────────
- name: Reset SSH authorized_keys to canonical set
  hosts: bare_metal
  gather_facts: false
  become: true
  max_fail_percentage: 50
  roles:
    - role: ssh_security
