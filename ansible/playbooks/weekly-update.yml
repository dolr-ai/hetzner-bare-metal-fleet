---
# Weekly maintenance playbook.
# Runs in order:
#   1. Full apt upgrade + beszel agent refresh on all bare metal hosts (parallel)
#   2. Rolling reboot of any host that has /var/run/reboot-required set (serial: 1)
#   3. Update beszel hub on uptime-monitor-1
#   4. Reset authorized_keys to canonical set on all bare metal hosts
#
# Usage:
#   ansible-playbook ansible/playbooks/weekly-update.yml
#   ansible-playbook ansible/playbooks/weekly-update.yml --limit <hostname>
#   ansible-playbook ansible/playbooks/weekly-update.yml -e enable_reboot=false  # suppress reboots

# ── Play 1: apt upgrade + beszel agent refresh (parallel) ───────────────────
- name: System update and beszel agent refresh
  hosts: bare_metal
  max_fail_percentage: 50
  gather_facts: true
  roles:
    - role: system_update
      vars:
        enable_reboot: false   # reboots handled separately in play 2
    - role: beszel_agent

# ── Play 2: Rolling reboot of hosts that require it ─────────────────────────
- name: Reboot hosts that require it (rolling)
  hosts: bare_metal
  serial: 1
  max_fail_percentage: 50
  gather_facts: false
  tasks:
    - name: Check if reboot is required
      stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: Reboot if required
      reboot:
        msg: "Rebooting after package upgrades (kernel or critical libraries updated)"
        reboot_timeout: 300
        connect_timeout: 20
        test_command: uptime
      when:
        - reboot_required_file.stat.exists
        - enable_reboot | default(true) | bool

# ── Play 3: Update beszel hub on uptime-monitor-1 ───────────────────────────
- name: Update beszel hub
  hosts: uptime-monitor-1
  gather_facts: false
  roles:
    - role: beszel_hub

# ── Play 4: Reset SSH authorized_keys to canonical set on all hosts ─────────
- name: Reset SSH authorized_keys to canonical set
  hosts: bare_metal
  gather_facts: false
  become: true
  max_fail_percentage: 50
  roles:
    - role: ssh_security
