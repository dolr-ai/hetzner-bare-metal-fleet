---
# Thin wrapper — all logic lives in the ssh_security role.
# Usage: ansible-playbook ansible/playbooks/ssh-security.yml --limit <hostname|group>

- name: SSH security hardening and authorized_keys reset
  hosts: "{{ target | default('all') }}"
  gather_facts: false
  become: true
  max_fail_percentage: 50
  roles:
    - role: ssh_security
