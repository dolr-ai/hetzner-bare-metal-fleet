---
# Ansible Variables - References to Vault Secrets
# This file is unencrypted and references encrypted values from vault.yml
#
# All sensitive values are stored in vault.yml and referenced here

# Hetzner Robot API credentials
hetzner_robot_user: "{{ vault_hetzner_robot_user }}"
hetzner_robot_password: "{{ vault_hetzner_robot_password }}"

# GitHub Actions SSH key
github_actions_ssh_private_key: "{{ vault_github_actions_ssh_private_key }}"

# Beszel monitoring configuration
beszel_hub_url: "https://beszel.yral.com"
beszel_listen_port: 45876
beszel_ssh_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFbMj/W6oT9440QejCiVlJbnuBlWK/mCxJnzEHO1dOYq"
# Universal token (from /settings/tokens on the Beszel hub) — allows agents to
# auto-register without needing a per-system token. Per-host vault values in
# host_vars/*/vault.yml take precedence over this if both are defined.
beszel_agent_token: "{{ vault_beszel_agent_token }}"

