---
# Common connection settings for all bare metal hosts
# The infra SSH key is extracted from Ansible vault by `mise run bootstrap`
# to .hetzner-infra-ed25519 (repo-local, gitignored).
ansible_user: root
ansible_ssh_private_key_file: "{{ inventory_dir }}/../../.hetzner-infra-ed25519"
ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
ansible_python_interpreter: /usr/bin/python3
