[defaults]
inventory = ansible/inventory/hosts.yml
host_key_checking = False
timeout = 60
gathering = smart
fact_caching = memory
fact_caching_timeout = 3600
retry_files_enabled = True
retry_files_save_path = ansible/retry
stdout_callback = default
stderr_callback = default
bin_ansible_callbacks = True
deprecation_warnings = False
collections_paths = ansible/collections
roles_path = ansible/roles
log_path = ansible/ansible.log
vault_password_file = ansible/.vault_pass

[inventory]
enable_plugins = yaml, ini, auto

[privilege_escalation]
become = False

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=120s -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no -o AddKeysToAgent=yes -o ForwardAgent=yes -o ServerAliveInterval=15 -o ServerAliveCountMax=20
pipelining = True
control_path = %(directory)s/%%h-%%r
retries = 5
