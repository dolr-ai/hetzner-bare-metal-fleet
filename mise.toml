# mise configuration — single source of truth for project dev tools.
# Activate with:  eval "$(mise activate bash)"   (or zsh/fish)
# Or prefix any command with `mise x --`.
# Docs: https://mise.jdx.dev

[plugins]
# fnox env plugin — automatically loads fnox-managed secrets into the shell.
# Requires `tools = true` so the plugin can find the mise-managed fnox binary.
fnox-env = "https://github.com/jdx/mise-env-fnox"

[tools]
# Python runtime used by Ansible and the pipx-backed CLIs below.
python = "3.12"

# Ansible (full community package) installed in an isolated venv.
# Uses uvx (uv tool install) under the hood — dependencies are installed
# automatically, so no --include-deps flag is needed (unlike raw pipx).
"pipx:ansible" = "latest"

# Linter for Ansible playbooks/roles.
"pipx:ansible-lint" = "latest"

# GitHub CLI.
gh = "latest"

# fnox — secret management tool by @jdx. Uses age for encryption.
# Secrets are defined declaratively in fnox.toml.
fnox = "latest"

# age — modern file encryption tool used by fnox for encrypting secrets.
age = "latest"

# uv — required runtime dependency for mise's pipx backend (used to install
# ansible and ansible-lint above in isolated venvs). Also useful for
# one-off `uvx` commands.
uv = "latest"

[env]
# Load fnox-managed secrets into the environment automatically.
# `tools = true` ensures the plugin runs after mise tools are on PATH.
# Plaintext values live inline in fnox.toml; secrets are age-encrypted.
_.fnox-env = { tools = true }

# Ensure Ansible finds the project config and collections without extra flags.
ANSIBLE_CONFIG = "{{ config_root }}/ansible.cfg"
ANSIBLE_COLLECTIONS_PATH = "{{ config_root }}/ansible/collections"

# ── Tasks ──────────────────────────────────────────────────────────────────
# Run with:  mise run <task>      (e.g. `mise run install`)

[tasks.install]
description = "Install all mise-managed tools and Ansible Galaxy collections"
run = [
    "mise install",
    "ansible-galaxy collection install -r ansible/requirements.yml --collections-path ansible/collections",
]
sources = ["mise.toml", "ansible/requirements.yml"]

[tasks.vault-decrypt]
description = "Decrypt the Ansible vault for editing"
run = "ansible-vault decrypt ansible/inventory/group_vars/all/vault.yml"

[tasks.vault-encrypt]
description = "Re-encrypt the Ansible vault after editing"
run = "ansible-vault encrypt ansible/inventory/group_vars/all/vault.yml"

[tasks.vault-setup]
description = "Create ansible/.vault_pass placeholder if missing"
run = '''
#!/usr/bin/env bash
set -euo pipefail
VAULT_PASS="ansible/.vault_pass"
if [ ! -f "$VAULT_PASS" ]; then
  echo "REPLACE_WITH_VAULT_PASSWORD" > "$VAULT_PASS"
  chmod 600 "$VAULT_PASS"
  echo "Created $VAULT_PASS with placeholder — replace with real password"
else
  chmod 600 "$VAULT_PASS"
  echo "$VAULT_PASS already exists — permissions ensured (600)"
fi
'''

[tasks.provision]
description = "Provision a host (usage: mise run provision -- --limit HOST)"
run = "ansible-playbook ansible/playbooks/provision.yml"

[tasks.ssh-access]
description = "Grant temporary SSH access (usage: mise run ssh-access -- --limit HOST -e team_member_name=NAME)"
run = "ansible-playbook ansible/playbooks/ssh-access.yml"

[tasks.weekly-update]
description = "Run weekly maintenance (usage: mise run weekly-update -- --limit HOST -e enable_reboot=true)"
run = "ansible-playbook ansible/playbooks/weekly-update.yml"

[tasks.lint]
description = "Lint Ansible playbooks and roles with ansible-lint"
run = "ansible-lint ansible/"