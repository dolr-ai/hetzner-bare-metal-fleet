# mise configuration — single source of truth for project dev tools.
# Activate with:  eval "$(mise activate bash)"   (or zsh/fish)
# Or prefix any command with `mise x --`.
# Docs: https://mise.jdx.dev

[tools]
# Python runtime — Ansible and ansible-lint are pip-installed into .venv
# by the `bootstrap` task (see below). No pipx/uv needed.
python = "3.12"

# GitHub CLI.
gh = "latest"

# fnox — secret management tool by @jdx. Uses age for encryption.
# Secrets are defined declaratively in fnox.toml.
fnox = "latest"

# age — modern file encryption tool used by fnox for encrypting secrets.
age = "latest"

[env]
# Put the project .venv on PATH so `ansible`, `ansible-lint`, etc. are available.
_.path = '.venv/bin'

# fnox age decryption — private key extracted by `mise run bootstrap`.
# Uses {{config_root}} so the path resolves to the repo root regardless of cwd.
FNOX_AGE_KEY_FILE = '{{config_root}}/.hetzner-infra-ed25519'

# Ensure Ansible finds the project config and collections without extra flags.
ANSIBLE_CONFIG = "{{ config_root }}/ansible.cfg"
ANSIBLE_COLLECTIONS_PATH = "{{ config_root }}/ansible/collections"

# ── Tasks ──────────────────────────────────────────────────────────────────
# Run with:  mise run <task>      (e.g. `mise run setup`)

[tasks.bootstrap]
description = "Create .venv, install Python tooling, and extract infra SSH key from vault"
run = '''
#!/usr/bin/env bash
set -euo pipefail

# Ensure vault password file exists (placeholder if missing — user must replace with real password)
if [ ! -f ansible/.vault_pass ]; then
  echo "REPLACE_WITH_VAULT_PASSWORD" > ansible/.vault_pass
  chmod 600 ansible/.vault_pass
  echo '  ⚠ Created ansible/.vault_pass placeholder — replace with real vault password to extract SSH key'
fi

# Create venv and install Python tooling (idempotent — venv module updates in place)
python -m venv .venv && ./.venv/bin/pip install --upgrade pip && ./.venv/bin/pip install ansible-core ansible-lint && ./.venv/bin/ansible-galaxy collection install -r ansible/requirements.yml -p ansible/collections

# Extract infra SSH private key from Ansible vault → ./.hetzner-infra-ed25519 (repo-local, gitignored)
# Used by fnox (age provider) to decrypt secrets. Idempotent — skips if already present.
# Resilient to wrong/placeholder vault passwords — prints warning instead of failing.
if [ ! -f .hetzner-infra-ed25519 ]; then
  if ./.venv/bin/ansible-vault view ansible/inventory/group_vars/all/vault.yml --vault-password-file ansible/.vault_pass 2>/dev/null | \
     ./.venv/bin/python -c "import sys, yaml; print(yaml.safe_load(sys.stdin)['vault_github_actions_ssh_private_key'])" \
     > .hetzner-infra-ed25519 2>/dev/null; then
    chmod 600 .hetzner-infra-ed25519
    echo '  ✓ Extracted infra SSH key to .hetzner-infra-ed25519'
  else
    rm -f .hetzner-infra-ed25519
    echo '  ⚠ Vault decryption failed — check ansible/.vault_pass contains the correct password'
  fi
else
  echo '  ✓ Infra SSH key already at .hetzner-infra-ed25519'
fi
'''
# `ansible/.vault_pass` in sources ensures re-run when the user creates/updates the vault password.
# `.venv` in outputs enables fast-skipping when nothing changed.
sources = ["mise.toml", "ansible/requirements.yml", "ansible/.vault_pass"]
outputs = [".venv", ".hetzner-infra-ed25519"]

[tasks.setup]
description = "Explicit full setup: install tools + run bootstrap (also runs automatically on cd via [hooks] enter)"
run = "mise install && mise run bootstrap && echo 'Environment is ready'"

[tasks.vault-decrypt]
description = "Decrypt the Ansible vault for editing"
run = "./.venv/bin/ansible-vault decrypt ansible/inventory/group_vars/all/vault.yml"

[tasks.vault-encrypt]
description = "Re-encrypt the Ansible vault after editing"
run = "./.venv/bin/ansible-vault encrypt ansible/inventory/group_vars/all/vault.yml"

[tasks.provision]
description = "Provision a host (usage: mise run provision -- --limit HOST)"
run = "ansible-playbook ansible/playbooks/provision.yml"

[tasks.ssh-access]
description = "Grant temporary SSH access (usage: mise run ssh-access -- --limit HOST -e team_member_name=NAME)"
run = "ansible-playbook ansible/playbooks/ssh-access.yml"

[tasks.weekly-update]
description = "Run weekly maintenance (usage: mise run weekly-update -- --limit HOST -e enable_reboot=true)"
run = "ansible-playbook ansible/playbooks/weekly-update.yml"

[tasks.lint]
description = "Lint Ansible playbooks and roles with ansible-lint"
run = "ansible-lint ansible/"

# ── Hooks ──────────────────────────────────────────────────────────────────
# Auto-run `bootstrap` when the project is entered (cd into the directory).
# Idempotent: mise skips it if `sources` are unchanged and `outputs` (.venv) exist.
# This makes the project fully self-setting-up — env vars, tools, .venv, and SSH key
# are all ready the moment you enter the directory, on any host with mise activated.
[hooks]
enter = { task = "bootstrap" }